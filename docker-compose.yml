services:
  app:
    build:
      context: ./
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
    user: ${UID:-1000}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/app
    environment:
      - PHP_IDE_CONFIG=serverName=docker
    command:
      - test

  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres" ]
      interval: 60s
      timeout: 1s
      retries: 10
      start_period: 30s
      start_interval: 1s

  pages:
    image: peaceiris/mdbook:latest
    user: ${UID:-1000}
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
    working_dir: /app
    command:
      - serve
      - -n
      - 0.0.0.0
